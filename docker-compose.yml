services:

  postgres:
    image: postgres:16
    

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: deeptrust

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: dima12004/deeptrust-backend:latest
    

    restart: unless-stopped

    depends_on:
      - postgres

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://postgres:1234@postgres:5432/deeptrust

  frontend:
    image: dima12004/deeptrust-frontend:latest
   

    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "5173:5173"

volumes:
  postgres_data:
